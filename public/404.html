<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>C# Course</title>
    <!--
      GitHub Pages SPA fallback. A direct hit / refresh on a client-side route
      (e.g. /csharp-course/topic/foundations) lands here; we encode the path into
      a query string and bounce to index.html, which decodes it back.
      https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1; // keep the "/csharp-course" project base
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
